global:
  scrape_interval:     15s
  evaluation_interval: 15s   # how often to evaluate alerting rules

# ── Alertmanager connection ───────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alert_rules.yml

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  - job_name: 'review-pulse-api'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
    metrics_path: '/metrics'

  # Node exporter — for CPU/memory/disk metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
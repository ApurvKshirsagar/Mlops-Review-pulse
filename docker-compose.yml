version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/data:/opt/airflow/data
    - ./mlflow:/opt/mlflow
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - review-pulse-net

services:

  # ── Database ──────────────────────────────────────────────
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    networks:
      - review-pulse-net

  # ── Airflow ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@reviewpulse.com"
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ── MLflow ────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////opt/mlflow/mlflow.db
      --default-artifact-root /opt/mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/opt/mlflow
    networks:
      - review-pulse-net

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      MLFLOW_URI: http://mlflow:5000
      MODEL_NAME: sentiment-tfidf-lr
      MODEL_STAGE: Production
      PROCESSED_DIR: /opt/airflow/data/processed
      PYTHONPATH: /app
    volumes:
      - ./mlflow:/opt/mlflow
      - ./airflow/data:/opt/airflow/data
    depends_on:
      - mlflow
    networks:
      - review-pulse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - review-pulse-net

  # ── Monitoring ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - review-pulse-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./monitoring/grafana:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    networks:
      - review-pulse-net

networks:
  review-pulse-net:
    driver: bridge

volumes:
  postgres-data:
  grafana-data: